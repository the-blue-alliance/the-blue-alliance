<div class="row">
    {% if alliance_selections is none %}
    <div class="alert alert-block alert-danger">
        <h4>Failed to fetch alliances for {{event_name}}</h4>
        <p>The FRC API returned an error.</p>
    </div>
    {% else %}
    <div class="alert alert-block alert-success">
        <h4>Got Alliances for {{event_name}}</h4>
    </div>
    <table class="table table-striped table-hover">
    {% for alliance in alliance_selections %}
        <tr>
            <td>{{loop.index}}</td>
            {% for team in alliance.picks %}
                <td>{{team}}</td>
            {% endfor %}
        </tr>
    {% endfor %}
    </table>
    {% endif %}
</div>

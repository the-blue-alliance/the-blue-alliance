name: On pull request (PWA)

on:
  # It needs to be pull_request_target because we need access to the repo variables in forks.
  # pull_request_target runs on the base branch; pull_request runs on the head branch (fork).
  pull_request_target:
    branches:
      - main

concurrency:
  group: ci-pwa-${{ github.head_ref }}
  cancel-in-progress: true

env:
  VITE_TBA_API_READ_KEY: ${{ vars.VITE_TBA_API_READ_KEY }}
  VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
  VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
  VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
  VITE_FIREBASE_DATABASE_URL: ${{ vars.VITE_FIREBASE_DATABASE_URL }}

jobs:
  pwa-lint:
    name: "[pwa] Format & Lint"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.24.0"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: "pwa/pnpm-lock.yaml"

      - name: Create dotenv
        run: ./ops/pwa/create_dotenv.sh --env

      - name: Install Dependencies
        run: pnpm --dir pwa install --frozen-lockfile

      - name: Run Format
        run: pnpm --dir pwa run format

      - name: Run Lint
        run: pnpm --dir pwa run lint

  pwa-type:
    name: "[pwa] Type Check"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.24.0"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: "pwa/pnpm-lock.yaml"

      - name: Create dotenv
        run: ./ops/pwa/create_dotenv.sh --env

      - name: Install Dependencies
        run: pnpm --dir pwa install --frozen-lockfile

      - name: Run Type Check
        run: pnpm --dir pwa run typecheck

  pwa-test:
    name: "[pwa] Test"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.24.0"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: "pwa/pnpm-lock.yaml"

      - name: Install Dependencies
        run: pnpm --dir pwa install --frozen-lockfile

      - name: Create dotenv
        run: ./ops/pwa/create_dotenv.sh --env

      - name: Run Test
        run: pnpm --dir pwa test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5.5.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: ./pwa/coverage/

  pwa-build:
    name: "[pwa] Build"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.24.0"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: "pwa/pnpm-lock.yaml"

      - name: Install Dependencies
        run: pnpm --dir pwa install --frozen-lockfile

      - name: Create dotenv
        run: ./ops/pwa/create_dotenv.sh --env

      - name: Run Build
        run: pnpm --dir pwa run build

  check-pwa-api:
    name: "[pwa] Check API regeneration"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.24.0"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: "pwa/pnpm-lock.yaml"

      - name: Create dotenv
        run: ./ops/pwa/create_dotenv.sh --env

      - name: Install Dependencies
        working-directory: pwa
        run: pnpm install --frozen-lockfile

      - name: Run generate-api.sh
        working-directory: ./pwa
        run: ./generate-api.sh

      - name: Detect changes in pwa/app/api
        run: |
          CHANGED_FILES=$(git diff --name-only pwa/app/api)
          if [[ -n "$CHANGED_FILES" ]]; then
            echo "::error title=API Mismatch::Files changed in pwa/app/api:"
            echo "$CHANGED_FILES"
            exit 1
          else
            echo "No changes detected in pwa/app/api."
          fi

  pwa-playwright:
    name: "[pwa] Playwright Tests"
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.24.0"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: "pwa/pnpm-lock.yaml"

      - name: Create dotenv
        run: ./ops/pwa/create_dotenv.sh --env

      - name: Install Dependencies
        working-directory: pwa
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: pwa
        run: pnpm exec playwright install --with-deps

      - name: Build application
        working-directory: pwa
        run: pnpm run build

      - name: Run Playwright tests
        working-directory: pwa
        run: pnpm exec playwright test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
